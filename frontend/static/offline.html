<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0f172a" />
		<meta name="robots" content="noindex, nofollow" />
		<title>Offline | HiAi Docs</title>
		<style>
			:root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, sans-serif; }
			body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: Canvas; color: CanvasText; }
			main { width: min(36rem, calc(100% - 3rem)); }
			h1 { margin: 0 0 0.75rem; font-size: 1.5rem; }
			p { margin: 0.5rem 0; line-height: 1.5; color: GrayText; }
			a { display: inline-block; margin-top: 1rem; color: #20b2aa; }
		</style>
	</head>
	<body>
		<main>
			<h1>You’re offline</h1>
			<p>Offline — showing locally available content.</p>
			<p>Reconnect to return to HiAi Docs. No changes will be sent automatically.</p>
			<a href="/offline">Open local documents</a>
		</main>
	</body>
</html>
