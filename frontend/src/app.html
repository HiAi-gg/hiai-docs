<!doctype html>
<html lang="%lang%" dir="%dir%">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="application-name" content="DocsMint" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.embed.tiptap.dev; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https: wss: http://localhost:* ws://localhost:*; frame-src 'self'; manifest-src 'self';" />
    %sveltekit.head%
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("hiai-docs-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored === "dark" || ((stored === null || stored === "system") && prefersDark);
          if (isDark) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (_) {
          /* no-op: localStorage may be unavailable (e.g. private mode) */
        }
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
