name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions; jobs that need more request them explicitly
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint — Biome 2.4.15 (configured in root biome.json)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Configure workspaces for CI
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.workspaces = pkg.workspaces.filter(w => !w.includes('hiai-ui'));
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'));
            if (pkg.dependencies && pkg.dependencies['@hiai-gg/hiai-ui']) {
              pkg.dependencies['@hiai-gg/hiai-ui'] = '^0.0.8';
            }
            fs.writeFileSync('frontend/package.json', JSON.stringify(pkg, null, 2));
          "
      - run: bun install
      - run: bun run lint

  # ---------------------------------------------------------------------------
  # 2. Typecheck — `bun run typecheck` (root)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Configure workspaces for CI
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.workspaces = pkg.workspaces.filter(w => !w.includes('hiai-ui'));
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'));
            if (pkg.dependencies && pkg.dependencies['@hiai-gg/hiai-ui']) {
              pkg.dependencies['@hiai-gg/hiai-ui'] = '^0.0.8';
            }
            fs.writeFileSync('frontend/package.json', JSON.stringify(pkg, null, 2));
          "
      - run: bun install
      - run: bun run typecheck

  # ---------------------------------------------------------------------------
  # 3. Test — Bun test runner with PostgreSQL + Redis services
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://aiuser:testpassword@localhost:5432/hiai_docs_test
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: test-secret-key-minimum-32-chars-long
      BETTER_AUTH_URL: http://localhost:50700
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Configure workspaces for CI
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.workspaces = pkg.workspaces.filter(w => !w.includes('hiai-ui'));
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'));
            if (pkg.dependencies && pkg.dependencies['@hiai-gg/hiai-ui']) {
              pkg.dependencies['@hiai-gg/hiai-ui'] = '^0.0.8';
            }
            fs.writeFileSync('frontend/package.json', JSON.stringify(pkg, null, 2));
          "
      - run: bun install

      - name: Build custom Postgres image
        run: docker build -t hiai-postgres:18-custom ./postgres

      - name: Start custom Postgres
        run: |
          docker run -d --name postgres \
            -e POSTGRES_DB=hiai_docs_test \
            -e POSTGRES_USER=aiuser \
            -e POSTGRES_PASSWORD=testpassword \
            -e HIAI_APP_PASSWORD=test-runtime-password \
            -p 5432:5432 \
            hiai-postgres:18-custom
          # Wait for ready
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U aiuser -d hiai_docs_test; then
              echo "Postgres ready"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres failed to start"
          docker logs postgres
          exit 1

      - run: cd packages/db && bun run db:migrate
        env:
          MIGRATION_DATABASE_URL: postgresql://aiuser:testpassword@localhost:5432/hiai_docs_test
      - run: bun run test

      - name: Stop Postgres
        if: always()
        run: docker stop postgres && docker rm postgres

  # ---------------------------------------------------------------------------
  # 4. Docker build — validate compose, build both images, security scan
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Configure workspaces for CI
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.workspaces = pkg.workspaces.filter(w => !w.includes('hiai-ui'));
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'));
            if (pkg.dependencies && pkg.dependencies['@hiai-gg/hiai-ui']) {
              pkg.dependencies['@hiai-gg/hiai-ui'] = '^0.0.8';
            }
            fs.writeFileSync('frontend/package.json', JSON.stringify(pkg, null, 2));
          "

      # Materialise a synthetic .env so `docker compose config` resolves vars
      - name: Prepare .env for compose validation
        run: |
          cp .env.example .env
          # Replace example secrets with deterministic test values
           sed -i 's/^BETTER_AUTH_SECRET=.*/BETTER_AUTH_SECRET=ci-validation-secret-32-chars-long-xxx/' .env
           sed -i 's/^CSRF_SECRET=.*/CSRF_SECRET=ci-csrf-secret-32-chars-long-yyy/' .env
           sed -i 's/^STORAGE_SECRET_KEY=.*/STORAGE_SECRET_KEY=ci-storage-secret-32-chars-long-zzz/' .env
           sed -i 's/^WEBHOOK_SECRET=.*/WEBHOOK_SECRET=ci-webhook-secret-32-chars-long-aaa/' .env

      # A) Validate docker-compose.yml — catches bad interpolations & schema errors
      - name: Validate docker compose
        run: docker compose config --quiet

      - name: Validate canonical container ports
        run: sh scripts/check-compose-port-contract.sh

      # B) Set up buildx with GitHub Actions cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # C) Build the backend image (root context, dockerfile: backend/Dockerfile)
      - name: Build backend image (api)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          tags: hiai-docs/api:ci-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=hiai-docs-api
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # D) Build the frontend image (root context, dockerfile: frontend/Dockerfile)
      - name: Build frontend image (web)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          build-args: |
            PUBLIC_APP_ID=docsmint
            PUBLIC_DEPLOYMENT_ID=ci-${{ github.sha }}
          tags: hiai-docs/web:ci-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=hiai-docs-web
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # E) Build the Caddy release image as well; it is part of the supported
      # deployment contour even though it does not run an application test.
      - name: Build Caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.caddy
          tags: hiai-docs/caddy:ci-${{ github.sha }}
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # E) Smoke test — start the built image and curl its health endpoint
      - name: Smoke test backend image
        env:
          BETTER_AUTH_SECRET: ci-smoke-secret-32-chars-long-bbb
          CSRF_SECRET: ci-csrf-secret-32-chars-long-ccc
          STORAGE_SECRET_KEY: ci-storage-secret-32-chars-long-ddd
          WEBHOOK_SECRET: ci-webhook-secret-32-chars-long-eee
          DATABASE_URL: postgresql://x:y@127.0.0.1:5432/z
          REDIS_URL: redis://127.0.0.1:6379
          API_PORT: 50700
          NODE_ENV: production
        run: |
          # Quick boot check — image must start, listen, and respond to /api/health
          docker run --rm -d --name hiai-docs-api-smoke \
            -e BETTER_AUTH_SECRET -e CSRF_SECRET -e STORAGE_SECRET_KEY \
            -e WEBHOOK_SECRET -e DATABASE_URL -e REDIS_URL \
            -e API_PORT -e NODE_ENV \
            -p 50700:50700 hiai-docs/api:ci-${{ github.sha }}
          sleep 5
          # Server is expected to fail DB connection in CI — we only verify the
          # image boots and the Bun runtime starts. A 5xx on /api/health is OK
          # as long as the port is open.
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:50700/api/health || true
          docker stop hiai-docs-api-smoke || true

      # F) Security scan — Trivy (preferred; Docker Scout as fallback)
      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: hiai-docs/api:ci-${{ github.sha }}
          format: "sarif"
          exit-code: "0"   # warn-only on PRs; tighten to "1" on protected branches
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: "trivy-api.sarif"
      - name: Upload Trivy SARIF (backend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Security scan frontend with Trivy
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: hiai-docs/web:ci-${{ github.sha }}
          format: "sarif"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: "trivy-web.sarif"
      - name: Upload Trivy SARIF (frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

      # G) Finalise cache (atomic swap)
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache



  # ---------------------------------------------------------------------------
  # 5. Clean consumer — verify the published package surface, including bins
  # ---------------------------------------------------------------------------
  package-consumer:
    name: Clean npm Consumer
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install and build SDK
        run: |
          bun install --frozen-lockfile
          cd packages/sdk && bun run build && bun run typecheck
          cd ../cli && bun run typecheck
          cd ../mcp-server && bun run typecheck
      - name: Pack public package
        run: |
          set -euo pipefail
          mkdir -p /tmp/hiai-docs-pack
          cp package.json /tmp/hiai-docs-private-package.json
          trap 'cp /tmp/hiai-docs-private-package.json package.json' EXIT
          cp package.public.json package.json
          rm -rf dist
          cp -R packages/sdk/dist dist
          npm pack --ignore-scripts --pack-destination /tmp/hiai-docs-pack
      - name: Install from tarball in a clean consumer
        run: |
          set -euo pipefail
          mkdir -p /tmp/hiai-docs-consumer
          cd /tmp/hiai-docs-consumer
          npm init -y >/dev/null
          npm install /tmp/hiai-docs-pack/*.tgz --ignore-scripts
          node --input-type=module -e "import('@hiai-gg/docsmint').then(() => console.log('SDK import: ok'))"
          npx --no-install docsmint --help >/tmp/docsmint-cli-help.txt
          set +e
          timeout 5s npx --no-install docsmint-mcp </dev/null >/tmp/docsmint-mcp.log 2>&1
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            cat /tmp/docsmint-mcp.log
            exit "$code"
          fi
          ! grep -Eq "ERR_MODULE_NOT_FOUND|Cannot find module" /tmp/docsmint-mcp.log

  # ---------------------------------------------------------------------------
  # 6. Publish Docker — runs only after every verification job passes
  # ---------------------------------------------------------------------------
  publish-docker:
    name: Publish Docker Images
    needs: [lint, typecheck, test, package-consumer, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Rebuild and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ghcr.io/hiai-gg/docsmint-api:${{ github.ref_name }}
            ghcr.io/hiai-gg/docsmint-api:latest
            vgalibov/docsmint:api-${{ github.ref_name }}
            vgalibov/docsmint:api-latest
      - name: Rebuild and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          build-args: |
            PUBLIC_APP_ID=docsmint
            PUBLIC_DEPLOYMENT_ID=${{ github.ref_name }}
          push: true
          tags: |
            ghcr.io/hiai-gg/docsmint-web:${{ github.ref_name }}
            ghcr.io/hiai-gg/docsmint-web:latest
            vgalibov/docsmint:web-${{ github.ref_name }}
            vgalibov/docsmint:web-latest
      - name: Rebuild and push Caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.caddy
          push: true
          tags: |
            ghcr.io/hiai-gg/docsmint-caddy:${{ github.ref_name }}
            ghcr.io/hiai-gg/docsmint-caddy:latest
            vgalibov/docsmint:caddy-${{ github.ref_name }}
            vgalibov/docsmint:caddy-latest


  # ---------------------------------------------------------------------------
  # 7. Publish NPM — publish package `@hiai-gg/docsmint` to NPM (Tokenless OIDC)
  # ---------------------------------------------------------------------------
  publish-npm:
    name: Publish NPM Package
    needs: [lint, typecheck, test, package-consumer, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # npm OIDC trusted publishing (tokenless) requires npm >= 11.5.1.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # sigstore is required by npm for --provenance flag in trusted publishing
      - name: Install sigstore for npm provenance
        run: npm install -g sigstore

      - name: Configure workspaces for CI
        run: |
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.workspaces = pkg.workspaces.filter(w => !w.includes('hiai-ui'));
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'));
            if (pkg.dependencies && pkg.dependencies['@hiai-gg/hiai-ui']) {
              pkg.dependencies['@hiai-gg/hiai-ui'] = '^0.0.8';
            }
            fs.writeFileSync('frontend/package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies
        run: bun install

      - name: Build SDK
        # The published tarball ships packages/sdk/dist/*. CI uses --ignore-scripts
        # at publish time, so prepublishOnly does not run. Build it explicitly here
        # to guarantee the dist/ artifacts exist before `npm publish`.
        run: cd packages/sdk && bun run build

      - name: Prepare public package.json
        run: |
          # Swap package.json with package.public.json for publishing
          # We also extract the version from the git tag (removing 'v' prefix if present)
          TAG_VERSION="${{ github.ref_name }}"
          CLEAN_VERSION="${TAG_VERSION#v}"

          # Replace name and version in package.public.json
          bun -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.public.json', 'utf8'));
            pkg.name = '@hiai-gg/docsmint';
            pkg.version = '${CLEAN_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Stage public package artifacts
        run: |
          rm -rf dist
          cp -R packages/sdk/dist dist

      - name: Publish to npm
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@hiai-gg/docsmint@${version}" version >/dev/null 2>&1; then
            echo "::notice::@hiai-gg/docsmint@${version} already on npm — skipping."
          else
            npm publish --access public --provenance --ignore-scripts
          fi


  # ---------------------------------------------------------------------------
  # 8. GitHub Release — created only after Docker and npm publication succeed
  # ---------------------------------------------------------------------------
  create-github-release:
    name: Create GitHub Release
    needs: [publish-docker, publish-npm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release from changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::notice::Release $GITHUB_REF_NAME already exists — updating its title."
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "DocsMint v${version}"
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "DocsMint v${version}" \
              --generate-notes
          fi
