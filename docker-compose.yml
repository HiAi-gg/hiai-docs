# hiai-docs Docker Compose
# Copy .env.example to .env before running

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${DB_NAME:-hiai_docs}
      POSTGRES_USER: ${DB_USER:-aiuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aiuser} -d ${DB_NAME:-hiai_docs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6384}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  ollama:
    image: ollama/ollama:0.13.4
    restart: unless-stopped
    # 11435 host: avoids conflict with primary Ollama on 11434
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  minio:
    image: minio/minio:RELEASE.2025-06-13T14-19-31Z
    restart: unless-stopped
    # 9021 host: avoids conflict with webs-minio (9001) and ai-shared-minio (9011)
    ports:
      - "9000:9000"
      - "9021:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      network: host
    restart: unless-stopped
    ports:
      - "${API_PORT:-50700}:50700"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      # $$ escapes compose interpolation so API_PORT is resolved at runtime
      # inside the container (not baked in at compose-parse time).
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${API_PORT}/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      DATABASE_URL: postgresql://${DB_USER:-aiuser}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-hiai_docs}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-hiai-docs}
      MINIO_PUBLIC_ENDPOINT: localhost
      MINIO_PUBLIC_PORT: 9000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:50700}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:50701,http://127.0.0.1:50701}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_OLLAMA_URL: http://ollama:11434
      EMBEDDING_FALLBACK_PROVIDER: ${EMBEDDING_FALLBACK_PROVIDER:-openrouter}
      EMBEDDING_FALLBACK_MODEL: ${EMBEDDING_FALLBACK_MODEL:-openai/text-embedding-3-small}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      API_PORT: ${API_PORT:-50700}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-50701}:50701"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # $$ escapes compose interpolation so WEB_PORT is resolved at runtime
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WEB_PORT}/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      API_URL: http://api:${API_PORT:-50700}
      PORT: ${WEB_PORT:-50701}
      WEB_PORT: ${WEB_PORT:-50701}
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles:
      - caddy
    ports:
      - "50708:80"
      - "50709:443"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  hiai-docs-net:
    driver: bridge

volumes:
  pgdata:
  redis_data:
  ollama_data:
  minio_data:
  caddy_data:
  caddy_config:
