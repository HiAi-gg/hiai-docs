# hiai-docs Docker Compose
# Copy .env.example to .env before running

services:
  postgres:
    build:
      context: ./postgres
    image: hiai-postgres:18-custom
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5437}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      # init.sql and the runtime-role bootstrap live in the build image.
    environment:
      POSTGRES_DB: ${DB_NAME:-hiai_docs}
      POSTGRES_USER: ${DB_USER:-aiuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      HIAI_APP_PASSWORD: ${HIAI_APP_PASSWORD:?HIAI_APP_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aiuser} -d ${DB_NAME:-hiai_docs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6384}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  seaweedfs:
    image: chrislusf/seaweedfs:3.85
    restart: unless-stopped
    ports:
      - "${STORAGE_PORT:-9000}:8333"      # S3 Gateway
      - "${STORAGE_UI_PORT:-9021}:8888"   # SeaweedFS Web UI (Filer)
    volumes:
      - seaweedfs_data:/data
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        printf '%s' "$$SEAWEEDFS_S3_CONFIG" > /data/s3.json
        exec /usr/bin/weed server -s3 -s3.port=8333 -s3.config=/data/s3.json -filer -filer.port=8888 -master.port=9333 -volume.port=8080 -dir=/data -ip=seaweedfs
    environment:
      SEAWEEDFS_S3_CONFIG: >-
        {"identities":[{"name":"hiai-docs","credentials":[{"accessKey":"${STORAGE_ACCESS_KEY:-hiai-docs}","secretKey":"${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY must be set}"}],"actions":["Admin","Read","List","Tagging","Write"]}]}
      SEAWEEDFS_S3_CORS_ALLOW_ORIGIN: ${STORAGE_CORS_ALLOW_ORIGIN:-http://localhost:50701,http://127.0.0.1:50701}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8888/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: migration
      network: host
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MIGRATION_DATABASE_URL: postgresql://aiuser:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/${DB_NAME:-hiai_docs}
    networks:
      - hiai-docs-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      network: host
    restart: unless-stopped
    ports:
      - "${API_PORT:-50700}:${API_PORT:-50700}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      # $$ escapes compose interpolation so API_PORT is resolved at runtime
      # inside the container (not baked in at compose-parse time).
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${API_PORT}/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      DATABASE_URL: postgresql://hiai_app:${HIAI_APP_PASSWORD:?HIAI_APP_PASSWORD must be set}@postgres:5432/${DB_NAME:-hiai_docs}
      HIAI_APP_PASSWORD: ${HIAI_APP_PASSWORD:?HIAI_APP_PASSWORD must be set}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-seaweedfs}
      STORAGE_PORT: 8333
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-hiai-docs}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY must be set}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-hiai-docs}
      STORAGE_PUBLIC_ENDPOINT: ${STORAGE_PUBLIC_ENDPOINT:-localhost}
      STORAGE_PUBLIC_PORT: ${STORAGE_PORT:-9000}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:50700}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:50701,http://127.0.0.1:50701}
      # OpenRouter is the public default; override these three values for
      # Ollama or another OpenAI-compatible embedding service.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://openrouter.ai/api/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      EMBEDDING_TIMEOUT_MS: ${EMBEDDING_TIMEOUT_MS:-120000}
      EMBEDDING_FALLBACK_BASE_URL: ${EMBEDDING_FALLBACK_BASE_URL:-https://openrouter.ai/api/v1}
      EMBEDDING_FALLBACK_API_KEY: ${EMBEDDING_FALLBACK_API_KEY:-}
      EMBEDDING_FALLBACK_MODEL: ${EMBEDDING_FALLBACK_MODEL:-baai/bge-m3}
      API_PORT: ${API_PORT:-50700}
      HIAI_DOCS_API_KEY: ${HIAI_DOCS_API_KEY}
      CSRF_SECRET: ${CSRF_SECRET:?CSRF_SECRET must be set}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET must be set}
      OWNER_ID: ${OWNER_ID}
      EMBEDDING_OLLAMA_URL: ${EMBEDDING_OLLAMA_URL:-}
      EMBEDDING_FALLBACK_PROVIDER: ${EMBEDDING_FALLBACK_PROVIDER:-}
      GRAPH_EXTRACT_ENABLED: ${GRAPH_EXTRACT_ENABLED:-false}
      GRAPH_SEARCH_ENABLED: ${GRAPH_SEARCH_ENABLED:-false}
      GRAPH_EXTRACT_BASE_URL: ${GRAPH_EXTRACT_BASE_URL:-https://openrouter.ai/api/v1}
      GRAPH_EXTRACT_API_KEY: ${GRAPH_EXTRACT_API_KEY:-}
      GRAPH_EXTRACT_MODEL: ${GRAPH_EXTRACT_MODEL:-mistralai/ministral-14b-2512}
      GRAPH_EXTRACT_REASONING_EFFORT: ${GRAPH_EXTRACT_REASONING_EFFORT:-}
      GRAPH_EXTRACT_TIMEOUT_MS: ${GRAPH_EXTRACT_TIMEOUT_MS:-120000}
      GRAPH_EXTRACT_FALLBACK_BASE_URL: ${GRAPH_EXTRACT_FALLBACK_BASE_URL:-https://openrouter.ai/api/v1}
      GRAPH_EXTRACT_FALLBACK_API_KEY: ${GRAPH_EXTRACT_FALLBACK_API_KEY:-}
      GRAPH_EXTRACT_FALLBACK_MODEL: ${GRAPH_EXTRACT_FALLBACK_MODEL:-google/gemma-4-31b-it}
      GRAPH_EXTRACT_MIN_CONFIDENCE: ${GRAPH_EXTRACT_MIN_CONFIDENCE:-0.5}
      GRAPH_EXPANSION_BOOST: ${GRAPH_EXPANSION_BOOST:-0.3}
      SEARCH_EXPANSION_ENABLED: ${SEARCH_EXPANSION_ENABLED:-true}
      SEARCH_EXPANSION_BASE_URL: ${SEARCH_EXPANSION_BASE_URL:-https://openrouter.ai/api/v1}
      SEARCH_EXPANSION_API_KEY: ${SEARCH_EXPANSION_API_KEY:-}
      SEARCH_EXPANSION_MODEL: ${SEARCH_EXPANSION_MODEL:-mistralai/ministral-14b-2512}
      SEARCH_EXPANSION_FALLBACK_BASE_URL: ${SEARCH_EXPANSION_FALLBACK_BASE_URL:-https://openrouter.ai/api/v1}
      SEARCH_EXPANSION_FALLBACK_API_KEY: ${SEARCH_EXPANSION_FALLBACK_API_KEY:-}
      SEARCH_EXPANSION_FALLBACK_MODEL: ${SEARCH_EXPANSION_FALLBACK_MODEL:-google/gemma-4-31b-it}
      SEARCH_EXPANSION_TIMEOUT_MS: ${SEARCH_EXPANSION_TIMEOUT_MS:-10000}
      SEARCH_EXPANSION_CACHE_TTL_SECONDS: ${SEARCH_EXPANSION_CACHE_TTL_SECONDS:-86400}
      SEARCH_EXPANSION_MAX_VARIANTS: ${SEARCH_EXPANSION_MAX_VARIANTS:-12}
      SEARCH_EXPANSION_ESTIMATED_COST_MICROUNITS: ${SEARCH_EXPANSION_ESTIMATED_COST_MICROUNITS:-0}
      SEARCH_RRF_K: ${SEARCH_RRF_K:-60}
      SEARCH_EXACT_BOOST: ${SEARCH_EXACT_BOOST:-0.02}
      SEARCH_CHANNEL_AGREEMENT_BOOST: ${SEARCH_CHANNEL_AGREEMENT_BOOST:-0.01}
      SEARCH_GRAPH_MAX_CONTRIBUTION: ${SEARCH_GRAPH_MAX_CONTRIBUTION:-0.03}
      SEARCH_VECTOR_MIN_SIMILARITY: ${SEARCH_VECTOR_MIN_SIMILARITY:-0.35}
      SEARCH_FUZZY_MIN_SIMILARITY: ${SEARCH_FUZZY_MIN_SIMILARITY:-0.25}
      SEARCH_MIN_CHANNEL_AGREEMENT: ${SEARCH_MIN_CHANNEL_AGREEMENT:-2}
      SEARCH_GRAPH_SEED_LIMIT: ${SEARCH_GRAPH_SEED_LIMIT:-10}
      SEARCH_GRAPH_MAX_HOPS: ${SEARCH_GRAPH_MAX_HOPS:-2}
      SEARCH_GRAPH_RESULT_LIMIT: ${SEARCH_GRAPH_RESULT_LIMIT:-20}
      HYBRID_TEXT_WEIGHT: ${HYBRID_TEXT_WEIGHT:-0.4}
      HYBRID_SEMANTIC_WEIGHT: ${HYBRID_SEMANTIC_WEIGHT:-0.6}
      CHUNK_TARGET_TOKENS: ${CHUNK_TARGET_TOKENS:-500}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-50}
      FOLDER_REEMBED_BATCH_SIZE: ${FOLDER_REEMBED_BATCH_SIZE:-100}
      CATEGORY_REEMBED_BATCH_SIZE: ${CATEGORY_REEMBED_BATCH_SIZE:-100}
      TAG_REEMBED_BATCH_SIZE: ${TAG_REEMBED_BATCH_SIZE:-500}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-50701}:${WEB_PORT:-50701}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # $$ escapes compose interpolation so WEB_PORT is resolved at runtime
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WEB_PORT}/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      API_URL: http://api:${API_PORT:-50700}
      PORT: ${WEB_PORT:-50701}
      WEB_PORT: ${WEB_PORT:-50701}
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    profiles:
      - caddy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  hiai-docs-net:
    driver: bridge

volumes:
  pgdata:
  # AGE graph now lives in the unified postgres database.
  redis_data:
  seaweedfs_data:
  caddy_data:
  caddy_config:
