# hiai-docs Docker Compose
# Copy .env.example to .env before running

services:
  postgres:
    build:
      context: ./postgres
    image: hiai-postgres:18-custom
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
 # init.sql now inside the build image
    environment:
      POSTGRES_DB: ${DB_NAME:-hiai_docs}
      POSTGRES_USER: ${DB_USER:-aiuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aiuser} -d ${DB_NAME:-hiai_docs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6384}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  minio:
    image: minio/minio:RELEASE.2025-06-26T16-23-29Z
    restart: unless-stopped
    # Console port mapped to 9021 to avoid common local port conflicts.
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9021:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      # Allow the browser to PUT directly to MinIO for presigned uploads.
      # Comma-separated list of origins; use `*` for development if you
      # don't want to pin a specific host. Default mirrors the
      # CORS_ORIGINS fallback so the same frontend origin works.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:50701,http://127.0.0.1:50701}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      network: host
    restart: unless-stopped
    ports:
      - "${API_PORT:-50700}:50700"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # $$ escapes compose interpolation so API_PORT is resolved at runtime
      # inside the container (not baked in at compose-parse time).
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${API_PORT}/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      DATABASE_URL: postgresql://${DB_USER:-aiuser}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-hiai_docs}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-hiai-docs}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost}
      MINIO_PUBLIC_PORT: ${MINIO_PORT:-9000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:50700}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:50701,http://127.0.0.1:50701}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_FALLBACK_BASE_URL: ${EMBEDDING_FALLBACK_BASE_URL:-}
      EMBEDDING_FALLBACK_API_KEY: ${EMBEDDING_FALLBACK_API_KEY:-}
      EMBEDDING_FALLBACK_MODEL: ${EMBEDDING_FALLBACK_MODEL:-}
      API_PORT: ${API_PORT:-50700}
      HIAI_DOCS_API_KEY: ${HIAI_DOCS_API_KEY}
      CSRF_SECRET: ${CSRF_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      OWNER_ID: ${OWNER_ID}
      EMBEDDING_OLLAMA_URL: ${EMBEDDING_OLLAMA_URL:-}
      EMBEDDING_FALLBACK_PROVIDER: ${EMBEDDING_FALLBACK_PROVIDER:-}
      GRAPH_EXTRACT_ENABLED: ${GRAPH_EXTRACT_ENABLED:-false}
      GRAPH_SEARCH_ENABLED: ${GRAPH_SEARCH_ENABLED:-false}
      GRAPH_EXTRACT_BASE_URL: ${GRAPH_EXTRACT_BASE_URL:-}
      GRAPH_EXTRACT_API_KEY: ${GRAPH_EXTRACT_API_KEY:-}
      GRAPH_EXTRACT_MODEL: ${GRAPH_EXTRACT_MODEL:-}
      GRAPH_EXTRACT_FALLBACK_BASE_URL: ${GRAPH_EXTRACT_FALLBACK_BASE_URL:-}
      GRAPH_EXTRACT_FALLBACK_API_KEY: ${GRAPH_EXTRACT_FALLBACK_API_KEY:-}
      GRAPH_EXTRACT_FALLBACK_MODEL: ${GRAPH_EXTRACT_FALLBACK_MODEL:-}
      GRAPH_EXTRACT_MIN_CONFIDENCE: ${GRAPH_EXTRACT_MIN_CONFIDENCE:-0.5}
      GRAPH_EXPANSION_BOOST: ${GRAPH_EXPANSION_BOOST:-0.3}
      HYBRID_TEXT_WEIGHT: ${HYBRID_TEXT_WEIGHT:-0.4}
      HYBRID_SEMANTIC_WEIGHT: ${HYBRID_SEMANTIC_WEIGHT:-0.6}
      CHUNK_TARGET_TOKENS: ${CHUNK_TARGET_TOKENS:-500}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-50}
      FOLDER_REEMBED_BATCH_SIZE: ${FOLDER_REEMBED_BATCH_SIZE:-100}
      CATEGORY_REEMBED_BATCH_SIZE: ${CATEGORY_REEMBED_BATCH_SIZE:-100}
      TAG_REEMBED_BATCH_SIZE: ${TAG_REEMBED_BATCH_SIZE:-500}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-50701}:50701"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # $$ escapes compose interpolation so WEB_PORT is resolved at runtime
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WEB_PORT}/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      API_URL: http://api:${API_PORT:-50700}
      PORT: ${WEB_PORT:-50701}
      WEB_PORT: ${WEB_PORT:-50701}
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    profiles:
      - caddy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - hiai-docs-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  hiai-docs-net:
    driver: bridge

volumes:
  pgdata:
 # AGE graph now lives in the unified postgres database
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
